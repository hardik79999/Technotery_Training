<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Dashboard - Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="loadingOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 15, 26, 0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
        <div class="spinner-border text-info" role="status" style="width: 4rem; height: 4rem;"></div>
        <h4 class="text-white mt-4" id="loadingText">Please wait...</h4>
    </div>

    <nav class="navbar navbar-dark px-4 mb-4 shadow" style="background: rgba(15, 15, 26, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);">
        <a class="navbar-brand fw-bold text-info" href="#" style="background: linear-gradient(135deg, #00c6ff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Vision Task Manager</a>
        <div class="d-flex align-items-center">
            <span class="badge bg-transparent border border-info text-light me-3 p-2" id="userBadge">Loading...</span>
            <button class="btn btn-outline-info btn-sm me-3" onclick="fetchDashboardData()">🔄 Refresh</button>
            <button class="btn btn-danger btn-sm" style="background: linear-gradient(135deg, #ff416c, #ff4b2b); border: none;" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card-3d p-4">
                    <h4 class="text-white mb-3">📈 Live Analytics</h4>
                    <div style="height: 250px; width: 100%; display: flex; justify-content: center;">
                        <canvas id="taskChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div id="admin-view" class="role-section card-3d mb-4">
                    <h4 class="text-warning">👑 Admin Center</h4>
                    <button class="btn-3d w-100 mb-2" data-bs-toggle="modal" data-bs-target="#createUserModal">Add User/Manager</button>
                    <button class="btn-3d w-100" style="background: linear-gradient(135deg, #11998e, #38ef7d);" data-bs-toggle="modal" data-bs-target="#createTaskModal">Assign Task</button>
                </div>
                <div id="manager-view" class="role-section card-3d mb-4">
                    <h4 class="text-primary">👔 Manager Center</h4>
                    <button class="btn-3d w-100 mb-2" data-bs-toggle="modal" data-bs-target="#createUserModal">Add Employee</button>
                    <button class="btn-3d w-100" style="background: linear-gradient(135deg, #11998e, #38ef7d);" data-bs-toggle="modal" data-bs-target="#createTaskModal">Assign Task</button>
                </div>
                <div id="employee-view" class="role-section card-3d mb-4">
                    <h4 class="text-success">👷 Workspace</h4>
                    <p class="text-light small">Manage your assigned tasks here.</p>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card-3d">
                    <h4 class="text-white border-bottom border-secondary pb-2">📋 Task Board</h4>
                    <div id="task-list-container" class="mt-3" style="max-height: 500px; overflow-y: auto;">
                        <p class="text-muted">Loading your tasks...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createUserModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Add User</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="createUserForm"><input type="text" id="newUsername" class="form-control mb-3" placeholder="Username" required><input type="email" id="newEmail" class="form-control mb-3" placeholder="Email" required><input type="password" id="newPassword" class="form-control mb-3" placeholder="Password" required><select id="newRole" class="form-control mb-4"><option value="employee">Employee</option><option value="manager" id="managerOption">Manager</option></select><button type="submit" class="btn-3d w-100">Create</button></form></div></div></div></div>
    <div class="modal fade" id="createTaskModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Assign Task</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="createTaskForm"><input type="text" id="taskTitle" class="form-control mb-3" placeholder="Task Title" required><textarea id="taskDesc" class="form-control mb-3" placeholder="Description" rows="3"></textarea><select id="assignToUser" class="form-control mb-4" required><option value="">Select Assignee...</option></select><button type="submit" class="btn-3d w-100" style="background: linear-gradient(135deg, #11998e, #38ef7d);">Assign Task</button></form></div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <script src="/static/dashboard.js"></script>
</body>
</html>
