<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark px-4 mb-4 shadow">
        <a class="navbar-brand fw-bold text-info" href="#">Task Manager</a>
        <div class="d-flex align-items-center">
            <span class="badge bg-secondary me-3" id="userBadge">Loading...</span>
            <button class="btn btn-outline-info btn-sm me-3" onclick="fetchDashboardData()">🔄 Refresh Data</button>
            <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div id="admin-view" class="role-section card-3d mb-4">
            <h3 class="text-warning">👑 Admin Panel</h3>
            <div class="mt-3">
                <button class="btn btn-info me-2" data-bs-toggle="modal" data-bs-target="#createUserModal">Create User/Manager</button>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createTaskModal">Assign Global Task</button>
            </div>
        </div>

        <div id="manager-view" class="role-section card-3d mb-4">
            <h3 class="text-primary">👔 Manager Panel</h3>
            <div class="mt-3">
                <button class="btn btn-info me-2" data-bs-toggle="modal" data-bs-target="#createUserModal">Create Employee</button>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createTaskModal">Assign Task</button>
            </div>
        </div>

        <div id="employee-view" class="role-section card-3d mb-4">
            <h3 class="text-success">👷 Employee Panel</h3>
            <p class="text-light">Welcome! Here are your assigned tasks. Update their status as you work.</p>
        </div>

        <div class="card-3d mt-4">
            <h4 class="text-info border-bottom pb-2">📋 Task Management</h4>
            <div id="task-list-container" class="mt-3">
                <p class="text-muted">Loading your tasks...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New User</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createUserForm">
                        <input type="text" id="newUsername" class="form-control mb-3" placeholder="Enter Username" required>
                        <input type="email" id="newEmail" class="form-control mb-3" placeholder="Enter Email" required>
                        <input type="password" id="newPassword" class="form-control mb-3" placeholder="Enter Password" required>
                        <select id="newRole" class="form-control mb-4">
                            <option value="employee">Employee</option>
                            <option value="manager" id="managerOption">Manager</option>
                        </select>
                        <button type="submit" class="btn-3d w-100">Create Account</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createTaskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Assign New Task</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createTaskForm">
                        <input type="text" id="taskTitle" class="form-control mb-3" placeholder="Task Title" required>
                        <textarea id="taskDesc" class="form-control mb-3" placeholder="Task Description" rows="3"></textarea>
                        <select id="assignToUser" class="form-control mb-4" required>
                            <option value="">Select Assignee...</option>
                        </select>
                        <button type="submit" class="btn-3d w-100" style="background: linear-gradient(135deg, #28a745, #218838);">Assign Task</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/dashboard.js"></script>
</body>
</html>
