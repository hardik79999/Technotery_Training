<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Post</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS wahi purani "Create Post" wali hi use hogi jo maine pehle di thi */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { background: #0f172a; color: white; font-family: 'Poppins'; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .form-container { background: rgba(30, 41, 59, 0.6); padding: 3rem; border-radius: 20px; width: 500px; border: 1px solid rgba(255,255,255,0.1); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 8px; }
        .update-btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; padding: 12px; width: 100%; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 style="color: #38bdf8; margin-bottom: 20px;">Update Post</h2>
        <form action="/update-post/{{ post.id }}" method="POST">
            <label>Title</label>
            <input type="text" name="title" value="{{ post.title }}" required>
            
            <label>Author</label>
            <input type="text" name="author" value="{{ post.author }}" required>
            
            <label>Content</label>
            <textarea name="content" rows="5" required>{{ post.content }}</textarea>
            
            <button type="submit" class="update-btn">SAVE CHANGES</button>
            <a href="/" style="display:block; text-align:center; color:#94a3b8; margin-top:15px; text-decoration:none;">Cancel</a>
        </form>
    </div>
</body>
</html>
